services:
  - type: web
    name: autonomous-agent-api
    env: docker
    dockerfilePath: ./apps/api/Dockerfile.prod
    dockerContext: ./apps/api
    plan: starter # Options: free, starter, standard
    region: oregon 
    healthCheckPath: /api/v1/health # assuming standard router prefix is applied
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autonomous-agent-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false # Admin must add manually
      - key: BACKEND_CORS_ORIGINS
        value: "https://web-m9w0vykcw-invicis-projects.vercel.app, https://web-rbodklvl0-invicis-projects.vercel.app"

databases:
  - name: autonomous-agent-db
    databaseName: autonomous_agent
    user: admin
    plan: starter
    region: oregon
